<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Health Engine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #050507;
  --bg-elevated: #0a0a0e;
  --bg-card: #0e0e13;
  --border: #1a1a24;
  --text: #eaeaee;
  --text-secondary: #b8b8c8;
  --text-tertiary: #68687a;
  --accent: #4ae68a;
  --accent-dim: rgba(74, 230, 138, 0.08);
  --accent-glow: rgba(74, 230, 138, 0.15);
  --red: #f06060;
  --red-dim: rgba(240, 96, 96, 0.08);
  --amber: #f0b040;
  --amber-dim: rgba(240, 176, 64, 0.08);
  --blue: #60a0f0;
  --blue-dim: rgba(96, 160, 240, 0.06);
  --font-display: 'Barlow Condensed', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

/* ── Grain overlay ── */
body::after {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
}

/* ── Nav ── */
.nav {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(5, 5, 7, 0.92);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
}

.nav-inner {
  max-width: 880px;
  margin: 0 auto;
  padding: 16px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.nav-brand {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-tertiary);
}

.nav-right {
  display: flex;
  align-items: center;
  gap: 16px;
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--text-tertiary);
}

.freshness-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  display: inline-block;
}
.freshness-dot.fresh { background: var(--accent); box-shadow: 0 0 6px var(--accent-glow); }
.freshness-dot.stale { background: var(--amber); }
.freshness-dot.old { background: var(--red); }

.wrap {
  max-width: 880px;
  margin: 0 auto;
  padding: 0 32px;
}

/* ═══════════════════════════════════════
   HERO — The statement
   ═══════════════════════════════════════ */
.hero {
  padding: 80px 0 64px;
  text-align: center;
  position: relative;
}

.hero::before {
  content: '';
  position: absolute;
  top: -100px; left: 50%; transform: translateX(-50%);
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(74, 230, 138, 0.06) 0%, transparent 65%);
  pointer-events: none;
}

.hero-ring {
  position: relative;
  width: 200px;
  height: 200px;
  margin: 0 auto 40px;
}

.hero-ring svg { width: 100%; height: 100%; }

.ring-bg { fill: none; stroke: rgba(255,255,255,0.03); stroke-width: 4; }
.ring-track {
  fill: none; stroke-width: 4; stroke-linecap: round;
  stroke: var(--accent);
  filter: drop-shadow(0 0 8px var(--accent-glow));
  transition: stroke-dasharray 1.6s cubic-bezier(0.4, 0, 0.2, 1) 0.3s;
}

.ring-center-text {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

.ring-number {
  font-family: var(--font-display);
  font-size: 3.6rem;
  font-weight: 600;
  line-height: 1;
  color: #fff;
  letter-spacing: -2px;
}

.ring-number span {
  font-size: 1.6rem;
  color: var(--text-secondary);
  letter-spacing: 0;
}

.ring-sub {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.14em;
  margin-top: 4px;
}

.hero-stats {
  display: flex;
  justify-content: center;
  gap: 64px;
}

.hero-stat-val {
  font-family: var(--font-display);
  font-size: 2rem;
  font-weight: 600;
  color: #fff;
  line-height: 1;
}

.hero-stat-val span { font-size: 1rem; color: var(--text-tertiary); }

.hero-stat-label {
  font-family: var(--font-mono);
  font-size: 0.58rem;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  margin-top: 6px;
}

.hero-flywheel {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 20px;
  margin-top: 48px;
  font-family: var(--font-mono);
  font-size: 0.62rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-tertiary);
}

.fw-active { color: var(--text-secondary); }
.fw-arrow { opacity: 0.3; }

/* ═══════════════════════════════════════
   NEXT MOVES — The compass
   ═══════════════════════════════════════ */
.moves {
  padding: 0 0 80px;
}

.moves-label {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-tertiary);
  margin-bottom: 20px;
}

.moves-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}

.move-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  transition: border-color 0.3s, box-shadow 0.3s, transform 0.2s;
  cursor: default;
}

.move-card:hover {
  border-color: rgba(74, 230, 138, 0.2);
  box-shadow: 0 4px 30px rgba(0,0,0,0.4), 0 0 20px var(--accent-dim);
  transform: translateY(-2px);
}

.move-name {
  font-family: var(--font-display);
  font-size: 1.2rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.02em;
  color: #fff;
}

.move-desc {
  font-size: 0.82rem;
  color: var(--text-secondary);
  line-height: 1.5;
}

.move-foot {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: auto;
  padding-top: 8px;
}

.move-cost {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  color: var(--text-tertiary);
}

.move-pts {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  color: var(--accent);
  background: var(--accent-dim);
  padding: 3px 10px;
  border-radius: 100px;
}

/* ═══════════════════════════════════════
   ACT HEADERS — Editorial section breaks
   ═══════════════════════════════════════ */
.act {
  padding: 80px 0 0;
  position: relative;
}

.act-header {
  display: flex;
  align-items: baseline;
  gap: 20px;
  margin-bottom: 40px;
}

.act-number {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  color: var(--text-tertiary);
  letter-spacing: 0.1em;
}

.act-title {
  font-family: var(--font-display);
  font-size: 2.8rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.02em;
  line-height: 1;
  color: #fff;
  letter-spacing: -0.5px;
}

.act-line {
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, var(--border) 0%, transparent 100%);
  margin-bottom: 8px;
}

/* ═══════════════════════════════════════
   COACH READ — The one thing to know
   ═══════════════════════════════════════ */
.coach-block {
  font-family: var(--font-body);
  font-size: 1.15rem;
  font-style: italic;
  font-weight: 300;
  line-height: 1.7;
  color: var(--text-secondary);
  max-width: 640px;
  margin-bottom: 48px;
}

.coach-block strong {
  color: #fff;
  font-style: normal;
}

/* ═══════════════════════════════════════
   SECTION — Collapsible content blocks
   ═══════════════════════════════════════ */
.section {
  margin-bottom: 8px;
}

.section-trigger {
  width: 100%;
  background: none;
  border: none;
  color: var(--text);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 0;
  text-align: left;
}

.section-name {
  font-family: var(--font-body);
  font-size: 0.92rem;
  font-weight: 600;
  letter-spacing: 0.02em;
}

.section-meta {
  display: flex;
  align-items: center;
  gap: 10px;
}

.section-badge {
  font-family: var(--font-mono);
  font-size: 0.58rem;
  color: var(--text-tertiary);
  padding: 3px 10px;
  border-radius: 100px;
  background: rgba(255,255,255,0.03);
}

.section-badge.warn { color: var(--amber); background: var(--amber-dim); }
.section-badge.danger { color: var(--red); background: var(--red-dim); }
.section-badge.good { color: var(--accent); background: var(--accent-dim); }

.section-chev {
  width: 16px; height: 16px;
  color: var(--text-tertiary);
  transition: transform 0.3s ease;
}

.section.open .section-chev { transform: rotate(180deg); }

.section-body {
  display: none;
  padding-bottom: 32px;
}

.section.open .section-body { display: block; }

/* ═══════════════════════════════════════
   INSIGHT CARDS
   ═══════════════════════════════════════ */
.insights-stack { display: flex; flex-direction: column; gap: 6px; }

.insight {
  padding: 16px 20px;
  border-radius: 8px;
  background: var(--bg-card);
  border-left: 3px solid var(--text-tertiary);
}

.insight.sev-critical { border-left-color: var(--red); background: linear-gradient(90deg, rgba(240,96,96,0.04) 0%, var(--bg-card) 40%); }
.insight.sev-warning { border-left-color: var(--amber); background: linear-gradient(90deg, rgba(240,176,64,0.04) 0%, var(--bg-card) 40%); }
.insight.sev-positive { border-left-color: var(--accent); background: linear-gradient(90deg, rgba(74,230,138,0.04) 0%, var(--bg-card) 40%); }

.insight-top {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 4px;
}

.insight-title {
  font-size: 0.86rem;
  font-weight: 600;
}

.sev-tag {
  font-family: var(--font-mono);
  font-size: 0.5rem;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 3px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.sev-tag.critical { color: var(--red); background: var(--red-dim); }
.sev-tag.warning { color: var(--amber); background: var(--amber-dim); }
.sev-tag.positive { color: var(--accent); background: var(--accent-dim); }

.insight-body {
  font-size: 0.8rem;
  color: var(--text-secondary);
  line-height: 1.6;
}

/* ═══════════════════════════════════════
   PATTERNS GRID
   ═══════════════════════════════════════ */
.pat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.pat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px;
}

.pat-card.flagged {
  border-color: var(--red);
  box-shadow: 0 0 20px rgba(240,96,96,0.08);
}

.pat-name {
  font-family: var(--font-display);
  font-size: 1.05rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.02em;
  margin-bottom: 6px;
}

.pat-status {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  display: flex;
  align-items: center;
  gap: 6px;
}

.pat-dot {
  width: 6px; height: 6px; border-radius: 50%;
}

.pat-dot.clear { background: var(--accent); box-shadow: 0 0 4px var(--accent-glow); }
.pat-dot.flagged { background: var(--red); box-shadow: 0 0 4px rgba(240,96,96,0.3); }

.pat-clear { color: var(--accent); }
.pat-flagged { color: var(--red); }

.pat-detail {
  font-family: var(--font-mono);
  font-size: 0.58rem;
  color: var(--text-tertiary);
  margin-top: 8px;
}

.no-pat {
  font-size: 0.86rem;
  color: var(--text-secondary);
  padding: 6px 0;
}

.no-pat strong { color: var(--accent); }

/* ═══════════════════════════════════════
   METRIC TABLE
   ═══════════════════════════════════════ */
.tier-label {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text-secondary);
  padding: 14px 0 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.tier-label .tc {
  width: 12px; height: 12px; color: var(--text-tertiary);
  transition: transform 0.2s;
}

.tier-label.shut .tc { transform: rotate(-90deg); }

.m-list { display: flex; flex-direction: column; }

.m-row {
  display: grid;
  grid-template-columns: 1fr auto auto auto;
  gap: 14px;
  align-items: center;
  padding: 12px 0;
}

.m-row.gap { opacity: 0.45; }

.m-name {
  font-size: 0.86rem;
  font-weight: 600;
}

.m-pct {
  font-family: var(--font-mono);
  font-size: 0.58rem;
  color: var(--text-tertiary);
  margin-top: 1px;
}

.m-val {
  font-family: var(--font-mono);
  font-size: 0.88rem;
  font-weight: 500;
  text-align: right;
  white-space: nowrap;
}

.m-unit {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  color: var(--text-tertiary);
  min-width: 50px;
}

.zone {
  font-family: var(--font-mono);
  font-size: 0.52rem;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 100px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  white-space: nowrap;
}

.z-optimal { color: var(--accent); background: var(--accent-dim); }
.z-good { color: var(--text-secondary); background: rgba(255,255,255,0.05); }
.z-average { color: var(--amber); background: var(--amber-dim); }
.z-below { color: #f08040; background: rgba(240,128,64,0.08); }
.z-concerning { color: var(--red); background: var(--red-dim); }

.m-gap-cost {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  color: var(--text-tertiary);
}

/* ═══════════════════════════════════════
   DATA CARDS (recovery, body comp, movement, nutrition)
   ═══════════════════════════════════════ */
.card-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.dcard {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 22px;
  transition: border-color 0.2s;
}

.dcard:hover { border-color: #2a2a36; }

.dcard.stub {
  border-style: dashed;
  border-color: rgba(255,255,255,0.08);
  background: transparent;
}

.dcard-label {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-tertiary);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.dcard-dot {
  width: 6px; height: 6px; border-radius: 50%;
}

.dot-accent { background: var(--accent); box-shadow: 0 0 4px var(--accent-glow); }
.dot-blue { background: var(--blue); box-shadow: 0 0 4px rgba(96,160,240,0.3); }
.dot-amber { background: var(--amber); box-shadow: 0 0 4px rgba(240,176,64,0.2); }
.dot-red { background: var(--red); box-shadow: 0 0 4px rgba(240,96,96,0.2); }
.dot-dim { background: var(--text-tertiary); }

.dcard-big {
  font-family: var(--font-display);
  font-size: 2rem;
  font-weight: 600;
  color: #fff;
  line-height: 1;
}

.dcard-big .unit {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--text-tertiary);
  font-weight: 400;
}

.dcard-note {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  color: var(--text-tertiary);
  margin-top: 8px;
  line-height: 1.6;
}

.dcard-note.good { color: var(--accent); }
.dcard-note.bad { color: var(--red); }
.dcard-note.warn { color: var(--amber); }

.dcard-spark { margin-top: 12px; }
.dcard-spark svg { width: 100%; display: block; }

.dcard-axis {
  display: flex;
  justify-content: space-between;
  margin-top: 3px;
  font-family: var(--font-mono);
  font-size: 0.48rem;
  color: var(--text-tertiary);
  opacity: 0.6;
}

/* Gauge (sleep, regularity) */
.gauge {
  height: 3px;
  background: rgba(255,255,255,0.04);
  border-radius: 2px;
  margin-top: 12px;
  overflow: hidden;
}

.gauge-bar {
  height: 100%;
  border-radius: 2px;
  transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
}

.gauge-ends {
  display: flex;
  justify-content: space-between;
  margin-top: 4px;
  font-family: var(--font-mono);
  font-size: 0.48rem;
  color: var(--text-tertiary);
}

.gauge-ends .tgt { color: var(--accent); }
.gauge-ends .con { color: var(--red); }

/* Stub CTA */
.stub-text {
  font-family: var(--font-body);
  font-size: 0.82rem;
  color: var(--text-secondary);
  margin-top: 8px;
  line-height: 1.5;
}

/* ═══════════════════════════════════════
   HABITS
   ═══════════════════════════════════════ */
.habit-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 8px;
}

.habit {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 16px;
}

.habit-name {
  font-size: 0.72rem;
  font-weight: 500;
  text-transform: capitalize;
  color: var(--text-secondary);
  margin-bottom: 4px;
}

.habit-num {
  font-family: var(--font-display);
  font-size: 1.3rem;
  font-weight: 600;
  color: #fff;
  line-height: 1;
}

.habit-num.on { color: var(--accent); }
.habit-num.off { color: var(--text-tertiary); }

.habit-sub {
  font-family: var(--font-mono);
  font-size: 0.5rem;
  color: var(--text-tertiary);
  margin-top: 4px;
}

/* ═══════════════════════════════════════
   STRENGTH
   ═══════════════════════════════════════ */
.lift-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 16px;
}

.lift-sep {
  font-family: var(--font-mono);
  font-size: 0.55rem;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-top: 20px;
  padding-bottom: 6px;
}

/* ═══════════════════════════════════════
   EMPTY STATES
   ═══════════════════════════════════════ */
.empty {
  font-size: 0.86rem;
  color: var(--text-tertiary);
  padding: 8px 0;
  line-height: 1.6;
}

/* ═══════════════════════════════════════
   FOOTER
   ═══════════════════════════════════════ */
.foot {
  text-align: center;
  padding: 80px 0 48px;
}

.foot p {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  color: var(--text-tertiary);
  line-height: 2.2;
}

.foot a {
  color: var(--text-secondary);
  text-decoration: none;
  border-bottom: 1px dotted var(--text-tertiary);
  padding-bottom: 1px;
}

/* ═══════════════════════════════════════
   RESPONSIVE
   ═══════════════════════════════════════ */
@media (max-width: 700px) {
  .hero { padding: 48px 0 40px; }
  .hero-ring { width: 160px; height: 160px; }
  .ring-number { font-size: 2.8rem; }
  .hero-stats { gap: 32px; }
  .hero-stat-val { font-size: 1.5rem; }
  .moves-row { grid-template-columns: 1fr; }
  .pat-grid { grid-template-columns: 1fr; }
  .card-grid { grid-template-columns: 1fr; }
  .lift-grid { grid-template-columns: 1fr; }
  .act-title { font-size: 2rem; }
  .m-row { grid-template-columns: 1fr auto auto; }
  .m-unit { display: none; }
  .hero-flywheel { gap: 12px; }
}

/* ═══════════════════════════════════════
   ANIMATIONS
   ═══════════════════════════════════════ */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes pulse {
  0%, 100% { opacity: 0.15; }
  50% { opacity: 0.25; }
}

.anim { opacity: 0; animation: fadeUp 0.6s ease forwards; }
.anim-1 { animation-delay: 0.1s; }
.anim-2 { animation-delay: 0.2s; }
.anim-3 { animation-delay: 0.3s; }
</style>
</head>

<script>
function tog(id) { document.getElementById(id).classList.toggle('open'); }

function fmtDate(s) {
  return new Date(s + 'T00:00:00').toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
}

function age(dateStr) {
  const hrs = Math.floor((Date.now() - new Date(dateStr)) / 3600000);
  if (hrs < 1) return { t: 'now', c: 'fresh' };
  if (hrs < 24) return { t: hrs + 'h', c: 'fresh' };
  const d = Math.floor(hrs / 24);
  if (d <= 3) return { t: d + 'd', c: 'fresh' };
  if (d <= 30) return { t: d + 'd', c: 'stale' };
  return { t: Math.floor(d / 30) + 'mo', c: 'old' };
}

const Z = { 'Optimal':'z-optimal','Good':'z-good','Average':'z-average','Below Average':'z-below','Concerning':'z-concerning' };

function fmtHabit(k) { return k.replace(/_/g, ' '); }
function fmtLift(k) { return k.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase()); }

function coachRead(b) {
  function first(t, n) { return (t.match(/[^.]*[a-zA-Z][^.]*\./g) || [t]).slice(0, n).join(' ').trim(); }
  const ins = b.insights || [];
  const crit = ins.filter(i => i.severity === 'critical');
  const warn = ins.filter(i => i.severity === 'warning');
  if (crit.length) return first(crit[0].body, 2);
  if (warn.length >= 2) return `<strong>${warn[0].title.split('\u2014')[0].trim()}</strong> and <strong>${warn[1].title.split('\u2014')[0].trim()}</strong> are the two flags. ${first(warn[0].body, 1)}`;
  if (warn.length) return first(warn[0].body, 2);
  const pos = ins.filter(i => i.severity === 'positive');
  if (pos.length) return first(pos[0].body, 2);
  return 'All signals stable. Keep doing what you\'re doing.';
}

function spark(el, data, color) {
  if (!el || !data || data.length < 2) return;
  const v = data.filter(x => x !== null);
  if (v.length < 2) return;
  const W = 200, H = 40, P = 4;
  const mn = Math.min(...v), mx = Math.max(...v), rng = mx - mn || 1;
  const pts = data.map((x, i) => x === null ? null : `${(i/(data.length-1))*W},${P+((mx-x)/rng)*(H-P*2)}`).filter(Boolean);
  if (pts.length < 2) return;
  const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  svg.setAttribute('preserveAspectRatio','none');
  svg.style.height = '40px';
  const fx = pts[0].split(',')[0], lx = pts[pts.length-1].split(',')[0];
  const area = document.createElementNS('http://www.w3.org/2000/svg','polygon');
  area.setAttribute('points',`${fx},${H} ${pts.join(' ')} ${lx},${H}`);
  area.setAttribute('fill',color); area.setAttribute('opacity','0.06');
  svg.appendChild(area);
  const line = document.createElementNS('http://www.w3.org/2000/svg','polyline');
  line.setAttribute('points',pts.join(' '));
  line.setAttribute('fill','none'); line.setAttribute('stroke',color);
  line.setAttribute('stroke-width','1.5'); line.setAttribute('stroke-linecap','round');
  svg.appendChild(line);
  const lp = pts[pts.length-1].split(',');
  const dot = document.createElementNS('http://www.w3.org/2000/svg','circle');
  dot.setAttribute('cx',lp[0]); dot.setAttribute('cy',lp[1]);
  dot.setAttribute('r','3'); dot.setAttribute('fill',color);
  svg.appendChild(dot);
  el.appendChild(svg);
}

// ── RENDERS ──

function rNav(b) {
  document.getElementById('nav-date').textContent = fmtDate(b.as_of);
  const el = document.getElementById('nav-fresh');
  if (b.garmin?.last_updated) {
    const a = age(b.garmin.last_updated);
    el.innerHTML = `<span class="freshness-dot ${a.c}"></span> Garmin ${a.t}`;
  }
}

function rHero(b) {
  const s = b.score;
  const circ = 2 * Math.PI * 88;
  document.getElementById('ring-track').setAttribute('stroke-dasharray', `${(s.coverage/100)*circ} ${circ}`);
  document.getElementById('ring-num').innerHTML = `${s.coverage}<span>%</span>`;
  document.getElementById('stat-pct').innerHTML = `${s.avg_percentile}<span>th</span>`;
  const m = s.results.length;
  document.getElementById('stat-measured').textContent = `${m}/${m + s.gap_count}`;
  document.getElementById('stat-gaps').textContent = s.gap_count;
}

function rMoves(b) {
  const el = document.getElementById('moves-row');
  (b.score.top_gaps||[]).slice(0,3).forEach(g => {
    el.innerHTML += `<div class="move-card">
      <div class="move-name">${g.name}</div>
      <div class="move-desc">Close this gap to sharpen the picture.</div>
      <div class="move-foot">
        <span class="move-cost">${g.cost}</span>
        <span class="move-pts">+${g.weight} pts</span>
      </div>
    </div>`;
  });
}

function rInsights(b) {
  document.getElementById('coach-read').innerHTML = coachRead(b);
  const ins = b.insights || [];
  const bd = document.getElementById('badge-insights');
  const crit = ins.filter(i=>i.severity==='critical').length;
  const warn = ins.filter(i=>i.severity==='warning').length;
  if (crit) { bd.textContent=`${ins.length} (${crit} critical)`; bd.className='section-badge danger'; }
  else if (warn) { bd.textContent=`${ins.length} (${warn} warning)`; bd.className='section-badge warn'; }
  else { bd.textContent=ins.length; bd.className='section-badge'; }

  const order = {critical:0,warning:1,positive:2,neutral:3};
  const sorted = [...ins].sort((a,b) => (order[a.severity]??3) - (order[b.severity]??3));
  const tagMap = {critical:'critical',warning:'warning',positive:'positive'};

  let h = '<div class="insights-stack">';
  sorted.forEach(i => {
    const tag = tagMap[i.severity] ? `<span class="sev-tag ${tagMap[i.severity]}">${i.severity}</span>` : '';
    h += `<div class="insight sev-${i.severity}">
      <div class="insight-top"><span class="insight-title">${i.title}</span>${tag}</div>
      <div class="insight-body">${i.body}</div>
    </div>`;
  });
  h += '</div>';
  document.getElementById('body-insights').innerHTML = h;
}

function rPatterns(b) {
  const pats = b.patterns || [];
  const bd = document.getElementById('badge-patterns');
  const det = pats.filter(p=>p.detected);
  if (det.length) { bd.textContent=det.length+' detected'; bd.className='section-badge danger'; }
  else { bd.textContent='all clear'; bd.className='section-badge good'; }

  let h = '<div class="pat-grid">';
  pats.forEach(p => {
    const dc = p.detected ? 'flagged' : 'clear';
    h += `<div class="pat-card${p.detected?' flagged':''}">
      <div class="pat-name">${p.name}</div>
      <div class="pat-status pat-${dc}"><span class="pat-dot ${dc}"></span> ${p.detected?'Detected':'Clear'}</div>
      <div class="pat-detail">${p.criteria_met}/${p.criteria_total} criteria${p.metrics.length ? ' \u00b7 '+p.metrics.join(', ') : ''}</div>
    </div>`;
  });
  h += '</div>';
  if (!det.length) h += '<div class="no-pat"><strong>No compound patterns flagged.</strong> No dangerous combinations detected.</div>';
  document.getElementById('body-patterns').innerHTML = h;
}

function rStatus(b) {
  const res = b.score.results||[], gaps = b.score.top_gaps||[];
  const bd = document.getElementById('badge-status');
  const conc = res.filter(r=>r.standing==='Concerning').length;
  const below = res.filter(r=>r.standing==='Below Average').length;
  if (conc) { bd.textContent=conc+' concerning'; bd.className='section-badge danger'; }
  else if (below) { bd.textContent=below+' below avg'; bd.className='section-badge warn'; }
  else { bd.textContent=res.length+' scored'; bd.className='section-badge'; }

  const t1=res.filter(r=>r.tier===1), t2=res.filter(r=>r.tier===2);

  function tier(label, metrics, open) {
    const shut = open ? '' : ' shut';
    let h = `<div class="tier-label${shut}" onclick="this.classList.toggle('shut');this.nextElementSibling.style.display=this.classList.contains('shut')?'none':'flex'">
      <span>${label}</span><svg class="tc" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
    </div><div class="m-list" style="display:${open?'flex':'none'};flex-direction:column">`;
    metrics.forEach(r => {
      const z = Z[r.standing] || 'z-average';
      h += `<div class="m-row">
        <div><div class="m-name">${r.name}</div>${r.percentile_approx!=null?`<div class="m-pct">${r.percentile_approx}th percentile</div>`:''}</div>
        <span class="m-val">${r.value!=null?r.value:'\u2014'}</span>
        <span class="m-unit">${r.unit||''}</span>
        <span class="zone ${z}">${r.standing}</span>
      </div>`;
    });
    h += '</div>';
    return h;
  }

  let h = '';
  if (t1.length) h += tier('Tier 1 \u2014 High Impact', t1, true);
  if (t2.length) h += tier('Tier 2 \u2014 Supporting', t2, false);
  if (gaps.length) {
    h += `<div class="tier-label shut" onclick="this.classList.toggle('shut');this.nextElementSibling.style.display=this.classList.contains('shut')?'none':'flex'">
      <span>Gaps \u2014 ${gaps.length} unmeasured</span><svg class="tc" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
    </div><div class="m-list" style="display:none;flex-direction:column">`;
    gaps.forEach(g => {
      h += `<div class="m-row gap"><div><div class="m-name">${g.name}</div></div><span class="m-val">\u2014</span><span class="m-unit"></span><span class="m-gap-cost">${g.cost}</span></div>`;
    });
    h += '</div>';
  }
  document.getElementById('body-status').innerHTML = h;
}

function rRecovery(b, daily) {
  const el = document.getElementById('body-recovery');
  const bd = document.getElementById('badge-recovery');
  const g = b.garmin;
  const has = g && g.last_updated;
  const total = 5;
  let count = 0;

  let h = '<div class="card-grid">';
  if (has) {
    if (g.resting_hr != null) { count++;
      h += `<div class="dcard"><div class="dcard-label"><span class="dcard-dot dot-blue"></span>Resting Heart Rate</div>
        <div class="dcard-big">${g.resting_hr}<span class="unit"> bpm</span></div>
        <div class="dcard-note" id="rhr-trend"></div>
        <div class="dcard-spark" id="rhr-spark"></div>
        <div class="dcard-axis"><span>90d ago</span><span>today</span></div>
      </div>`;
    }
    if (g.hrv_rmssd_avg != null) { count++;
      h += `<div class="dcard"><div class="dcard-label"><span class="dcard-dot dot-accent"></span>HRV (RMSSD)</div>
        <div class="dcard-big">${g.hrv_rmssd_avg}<span class="unit"> ms</span></div>
        <div class="dcard-note" id="hrv-trend"></div>
        <div class="dcard-spark" id="hrv-spark"></div>
        <div class="dcard-axis"><span>90d ago</span><span>today</span></div>
      </div>`;
    }
    if (g.sleep_duration_avg != null) { count++;
      const pct = Math.max(0,Math.min(100,((g.sleep_duration_avg-4)/6)*100));
      const col = g.sleep_duration_avg>=7?'var(--accent)':'var(--amber)';
      h += `<div class="dcard"><div class="dcard-label"><span class="dcard-dot dot-amber"></span>Sleep Duration</div>
        <div class="dcard-big">${g.sleep_duration_avg}<span class="unit"> hrs</span></div>
        <div class="dcard-note ${g.sleep_duration_avg>=7?'good':'warn'}">${g.sleep_duration_avg>=7?'On target':'Below 7hr target'}</div>
        <div class="gauge"><div class="gauge-bar" style="width:${pct}%;background:${col}"></div></div>
        <div class="gauge-ends"><span>4</span><span class="tgt">7 target</span><span>10</span></div>
      </div>`;
    }
    if (g.sleep_regularity_stddev != null) { count++;
      const r=g.sleep_regularity_stddev;
      const pct=Math.max(0,Math.min(100,((r-15)/165)*100));
      const col=r<45?'var(--accent)':r<60?'var(--amber)':'var(--red)';
      h += `<div class="dcard"><div class="dcard-label"><span class="dcard-dot dot-red"></span>Sleep Regularity</div>
        <div class="dcard-big">\u00b1${Math.round(r)}<span class="unit"> min</span></div>
        <div class="dcard-note ${r<45?'good':'bad'}">${r<45?'Good regularity':r<60?'Needs work':'Concerning'}</div>
        <div class="gauge"><div class="gauge-bar" style="width:${pct}%;background:${col}"></div></div>
        <div class="gauge-ends"><span>15</span><span class="con">60+</span><span>180</span></div>
      </div>`;
    }
    if (g.vo2_max != null) { count++;
      h += `<div class="dcard"><div class="dcard-label"><span class="dcard-dot dot-accent"></span>VO2 Max</div>
        <div class="dcard-big">${g.vo2_max}<span class="unit"> mL/kg/min</span></div>
        <div class="dcard-note">Strongest predictor of all-cause mortality</div>
      </div>`;
    } else {
      h += `<div class="dcard stub"><div class="dcard-label"><span class="dcard-dot dot-dim"></span>VO2 Max</div>
        <div class="dcard-big" style="color:var(--text-tertiary)">\u2014</div>
        <div class="stub-text">Strongest mortality predictor. Free estimate from your wearable.</div>
      </div>`;
    }
  } else {
    ['Resting Heart Rate','HRV (RMSSD)','Sleep Duration','Sleep Regularity','VO2 Max'].forEach(n => {
      h += `<div class="dcard stub"><div class="dcard-label"><span class="dcard-dot dot-dim"></span>${n}</div>
        <div class="dcard-big" style="color:var(--text-tertiary)">\u2014</div>
        <div class="stub-text">Connect a wearable to track</div>
      </div>`;
    });
  }
  h += '</div>';
  bd.textContent = `${count}/${total} tracked`;
  if (count===total) bd.className='section-badge good';
  el.innerHTML = h;

  if (has && daily?.length) {
    spark(document.getElementById('rhr-spark'), daily.map(d=>d.rhr), 'var(--blue)');
    spark(document.getElementById('hrv-spark'), daily.map(d=>d.hrv), 'var(--accent)');
    function trend(vals, id, unit, invert) {
      if (vals.length <= 14) return;
      const e = vals.slice(0,14).reduce((a,b)=>a+b)/14;
      const l = vals.slice(-14).reduce((a,b)=>a+b)/14;
      const d = (l-e).toFixed(1);
      const good = invert ? d<=0 : d>=0;
      const arrow = d>0?'\u2191':'\u2193';
      const t = document.getElementById(id);
      if (t) { t.textContent=`90d: ${e.toFixed(0)} \u2192 ${l.toFixed(0)} ${unit} (${arrow}${Math.abs(d)})`; t.className='dcard-note '+(good?'good':'bad'); }
    }
    trend(daily.filter(d=>d.rhr).map(d=>d.rhr),'rhr-trend','bpm',true);
    trend(daily.filter(d=>d.hrv).map(d=>d.hrv),'hrv-trend','ms',false);
  }
}

function rBodyComp(b) {
  const el=document.getElementById('body-bodycomp');
  const bd=document.getElementById('badge-bodycomp');
  const w=b.weight;
  const hasW=w&&w.current;
  const waist=(b.score.results||[]).find(r=>r.name==='Waist Circumference');
  const hasWa=waist&&waist.has_data;
  bd.textContent=`${(hasW?1:0)+(hasWa?1:0)}/2 tracked`;

  let h='<div class="card-grid">';
  if (hasW) {
    h+=`<div class="dcard"><div class="dcard-label">Weight</div>
      <div class="dcard-big">${w.current}<span class="unit"> lbs</span></div>
      <div class="dcard-note">7d avg: ${w.rolling_avg_7d||'\u2014'} \u00b7 ${w.weekly_rate>0?'+':''}${w.weekly_rate} lbs/wk</div>
    </div>`;
  } else {
    h+=`<div class="dcard stub"><div class="dcard-label">Weight</div>
      <div class="dcard-big" style="color:var(--text-tertiary)">\u2014</div>
      <div class="stub-text">Smart scale or manual logging</div></div>`;
  }
  if (hasWa) {
    h+=`<div class="dcard"><div class="dcard-label">Waist</div>
      <div class="dcard-big">${waist.value}<span class="unit"> ${waist.unit||'in'}</span></div>
      <div class="dcard-note">${waist.clinical_note||''}</div></div>`;
  } else {
    h+=`<div class="dcard stub"><div class="dcard-label">Waist Circumference</div>
      <div class="dcard-big" style="color:var(--text-tertiary)">\u2014</div>
      <div class="stub-text">Tier 1 metric. $3 tape measure. Better than BMI for visceral fat.</div></div>`;
  }
  h+='</div>';
  el.innerHTML=h;
}

function rMovement(b) {
  const el=document.getElementById('body-movement');
  const bd=document.getElementById('badge-movement');
  const g=b.garmin;
  const has=g&&g.last_updated;
  const lifts=b.strength?Object.entries(b.strength).filter(([_,d])=>d&&d.current_1rm):[];
  let ct=0, tot=3;

  let h='<div class="card-grid">';
  if (has&&g.daily_steps_avg!=null) { ct++;
    const c=g.daily_steps_avg>=10000?'var(--accent)':g.daily_steps_avg>=7000?'var(--amber)':'var(--text-tertiary)';
    h+=`<div class="dcard"><div class="dcard-label">Daily Steps</div>
      <div class="dcard-big" style="color:${c}">${g.daily_steps_avg.toLocaleString()}<span class="unit"> /day</span></div>
      <div class="dcard-note">Target: 10,000+ \u00b7 Tier 1 metric</div></div>`;
  } else {
    h+=`<div class="dcard stub"><div class="dcard-label">Daily Steps</div>
      <div class="dcard-big" style="color:var(--text-tertiary)">\u2014</div>
      <div class="stub-text">Tier 1 metric. Free with phone or wearable.</div></div>`;
  }

  if (has&&g.zone2_min_per_week!=null) { ct++;
    const c=g.zone2_min_per_week>=150?'var(--accent)':'var(--amber)';
    h+=`<div class="dcard"><div class="dcard-label">Zone 2 Cardio</div>
      <div class="dcard-big" style="color:${c}">${g.zone2_min_per_week}<span class="unit"> min/wk</span></div>
      <div class="dcard-note">Target: 150+ min/week (AHA)</div></div>`;
  } else {
    h+=`<div class="dcard stub"><div class="dcard-label">Zone 2 Cardio</div>
      <div class="dcard-big" style="color:var(--text-tertiary)">\u2014</div>
      <div class="stub-text">Free with HR wearable. 150 min/wk target.</div></div>`;
  }

  if (has&&g.vo2_max!=null) { ct++;
    h+=`<div class="dcard"><div class="dcard-label">VO2 Max</div>
      <div class="dcard-big">${g.vo2_max}<span class="unit"> mL/kg/min</span></div>
      <div class="dcard-note">Strongest single predictor of all-cause mortality</div></div>`;
  } else {
    h+=`<div class="dcard stub"><div class="dcard-label">VO2 Max</div>
      <div class="dcard-big" style="color:var(--text-tertiary)">\u2014</div>
      <div class="stub-text">Free estimate from Garmin/Apple Watch.</div></div>`;
  }
  h+='</div>';

  const parts=[];
  if (ct) parts.push(ct+'/'+tot+' metrics');
  if (lifts.length) parts.push(lifts.length+' lifts');
  bd.textContent=parts.join(' \u00b7 ')||'0/'+tot;

  if (lifts.length) {
    h+='<div class="lift-sep">Strength</div><div class="card-grid lift-grid">';
    lifts.forEach(([n,d])=>{
      h+=`<div class="dcard"><div class="dcard-label">${fmtLift(n)}</div>
        <div class="dcard-big">${d.current_1rm}<span class="unit"> e1RM</span></div>
        <div class="dcard-note">Peak: ${d.peak_1rm} (${d.peak_pct}%) \u00b7 ${d.total_sets} sets</div></div>`;
    });
    h+='</div>';
  } else {
    h+='<div class="empty" style="margin-top:12px">No strength data logged yet.</div>';
  }
  el.innerHTML=h;
}

function rNutrition(b) {
  const el=document.getElementById('body-nutrition');
  const bd=document.getElementById('badge-nutrition');
  const n=b.nutrition;
  if (!n) { bd.textContent='not tracked'; el.innerHTML='<div class="empty">No nutrition data. Log meals to track macros.</div>'; return; }
  const t=n.today_totals||{}, r=n.remaining||{};
  const has=t.protein_g||t.calories;
  const pTgt=r.protein_g!=null?Math.round((t.protein_g||0)+r.protein_g):null;
  bd.textContent=has?(t.protein_g||0)+'g protein':'no meals today';

  if (has) {
    el.innerHTML=`<div class="dcard" style="max-width:400px"><div class="dcard-label">Today's Macros</div>
      <div class="dcard-big">${t.protein_g||0}<span class="unit">g protein</span></div>
      <div class="dcard-note">${t.calories?t.calories+' cal':''}${t.carbs_g?' \u00b7 '+t.carbs_g+'g C':''}${t.fat_g?' \u00b7 '+t.fat_g+'g F':''}${pTgt&&r.protein_g>0?'<br>'+r.protein_g+'g protein remaining':''}</div>
      ${n.protein_warning?'<div class="dcard-note warn" style="margin-top:6px">'+n.protein_warning+'</div>':''}
    </div>`;
  } else {
    el.innerHTML=`<div class="empty">No meals logged today.${pTgt?' Target: '+pTgt+'g protein.':''}</div>`;
  }
}

function rHabits(b) {
  const el=document.getElementById('body-habits');
  const bd=document.getElementById('badge-habits');
  if (!b.habits) { bd.textContent='not tracked'; el.innerHTML='<div class="empty">No habits configured.</div>'; return; }
  const entries=Object.entries(b.habits).filter(([_,d])=>d&&d.current_streak!=null).sort((a,b)=>b[1].current_streak-a[1].current_streak);
  if (!entries.length) { bd.textContent='none'; el.innerHTML='<div class="empty">No habit data yet.</div>'; return; }
  const active=entries.filter(([_,d])=>d.current_streak>0).length;
  bd.textContent=active+'/'+entries.length+' active';

  let h='<div class="habit-grid">';
  entries.forEach(([n,d])=>{
    h+=`<div class="habit">
      <div class="habit-name">${fmtHabit(n)}</div>
      <div class="habit-num ${d.current_streak>0?'on':'off'}">${d.current_streak}d</div>
      <div class="habit-sub">${d.completion_rate}% \u00b7 best ${d.longest_streak}d</div>
    </div>`;
  });
  h+='</div>';
  el.innerHTML=h;
}

async function init() {
  try {
    const [bRes, gRes] = await Promise.all([
      fetch('../data/briefing.json'),
      fetch('../data/garmin_daily.json').catch(()=>null),
    ]);
    const b = await bRes.json();
    const daily = gRes ? await gRes.json().catch(()=>null) : null;
    rNav(b); rHero(b); rMoves(b);
    rInsights(b); rPatterns(b); rStatus(b);
    rRecovery(b, daily); rBodyComp(b);
    rMovement(b); rNutrition(b); rHabits(b);
  } catch(e) {
    console.error(e);
    document.querySelector('.wrap').innerHTML+=`<div style="padding:40px 0;color:var(--red);font-family:var(--font-mono);font-size:0.8rem">Error: ${e.message}<br>Run: python3 cli.py briefing > data/briefing.json</div>`;
  }
}
init();
</script>
</body>
</html>
